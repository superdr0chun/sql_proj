<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebDB Manager - SQLAlchemy Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e1e;
            color: #cccccc;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            background: #252526;
            border-right: 1px solid #3c3c3c;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 15px;
            background: #333333;
            border-bottom: 1px solid #3c3c3c;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header h2 {
            font-size: 16px;
            color: #ffffff;
        }

        .add-server-btn {
            background: #0e639c;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
        }

        .add-server-btn:hover {
            background: #1177bb;
        }

        .tree-view {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .tree-item {
            padding: 5px 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            user-select: none;
        }

        .tree-item:hover {
            background: #2a2d2e;
        }

        .tree-item.selected {
            background: #37373d;
        }

        .tree-arrow {
            width: 16px;
            height: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 5px;
            font-size: 10px;
            color: #888;
        }

        .tree-icon {
            margin-right: 8px;
            font-size: 14px;
        }

        .tree-children {
            padding-left: 20px;
        }

        .hidden {
            display: none;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1e1e1e;
        }

        .toolbar {
            padding: 10px 15px;
            background: #333333;
            border-bottom: 1px solid #3c3c3c;
            display: flex;
            gap: 10px;
        }

        .toolbar button {
            background: #0e639c;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 13px;
        }

        .toolbar button:hover {
            background: #1177bb;
        }

        .toolbar button:disabled {
            background: #555;
            cursor: not-allowed;
        }

        .query-editor {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 15px;
        }

        .query-textarea {
            flex: 1;
            background: #1e1e1e;
            color: #d4d4d4;
            border: 1px solid #3c3c3c;
            padding: 10px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 14px;
            resize: none;
        }

        .query-textarea:focus {
            outline: none;
            border-color: #0e639c;
        }

        .results-panel {
            height: 40%;
            background: #252526;
            border-top: 1px solid #3c3c3c;
            overflow: auto;
        }

        .results-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .results-table th,
        .results-table td {
            padding: 8px 12px;
            text-align: left;
            border: 1px solid #3c3c3c;
        }

        .results-table th {
            background: #333333;
            color: #ffffff;
            position: sticky;
            top: 0;
        }

        .results-table tr:hover {
            background: #2a2d2e;
        }

        /* Context Menu */
        .context-menu {
            position: fixed;
            background: #252526;
            border: 1px solid #3c3c3c;
            border-radius: 3px;
            padding: 5px 0;
            min-width: 180px;
            z-index: 1000;
            display: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .context-menu-item {
            padding: 8px 15px;
            cursor: pointer;
            color: #cccccc;
        }

        .context-menu-item:hover {
            background: #0e639c;
            color: white;
        }

        .context-menu-separator {
            height: 1px;
            background: #3c3c3c;
            margin: 5px 0;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1001;
        }

        .modal {
            background: #252526;
            border: 1px solid #3c3c3c;
            border-radius: 5px;
            padding: 20px;
            min-width: 400px;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            font-size: 18px;
            color: #ffffff;
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #cccccc;
            font-size: 13px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 8px;
            background: #1e1e1e;
            border: 1px solid #3c3c3c;
            color: #cccccc;
            border-radius: 3px;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #0e639c;
        }

        .column-builder {
            background: #1e1e1e;
            padding: 10px;
            border: 1px solid #3c3c3c;
            border-radius: 3px;
            margin-bottom: 10px;
        }

        .column-row {
            display: grid;
            grid-template-columns: 2fr 1fr 60px 60px 60px 30px;
            gap: 5px;
            margin-bottom: 5px;
            align-items: center;
        }

        .column-row input,
        .column-row select {
            padding: 5px;
            background: #252526;
            border: 1px solid #3c3c3c;
            color: #cccccc;
            font-size: 12px;
        }

        .add-column-btn,
        .remove-column-btn {
            background: #0e639c;
            color: white;
            border: none;
            padding: 5px 8px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
        }

        .remove-column-btn {
            background: #c42b1c;
        }

        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-cancel {
            background: #3c3c3c;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 3px;
            cursor: pointer;
        }

        .btn-save {
            background: #0e639c;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 3px;
            cursor: pointer;
        }

        .status-bar {
            padding: 5px 15px;
            background: #007acc;
            color: white;
            font-size: 12px;
        }

        .info-panel {
            padding: 15px;
            background: #252526;
            border-top: 1px solid #3c3c3c;
        }

        .info-section {
            margin-bottom: 15px;
        }

        .info-section h4 {
            color: #ffffff;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .info-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .info-table th,
        .info-table td {
            padding: 6px 10px;
            text-align: left;
            border: 1px solid #3c3c3c;
        }

        .info-table th {
            background: #333333;
            color: #ffffff;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>🗄️ Servers</h2>
                <button class="add-server-btn" onclick="showAddServerModal()">+ Server</button>
            </div>
            <div class="tree-view" id="serverTree"></div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="toolbar">
                <button onclick="executeQuery()">▶ Execute (Ctrl+Enter)</button>
                <button onclick="clearResults()">🗑 Clear</button>
            </div>
            <div class="query-editor">
                <textarea class="query-textarea" id="queryEditor" placeholder="Enter SQL query here..."></textarea>
            </div>
            <div class="results-panel" id="resultsPanel">
                <div style="padding: 20px; color: #888;">Results will appear here...</div>
            </div>
        </div>
    </div>

    <!-- Context Menu -->
    <div class="context-menu" id="contextMenu">
        <div class="context-menu-item" onclick="handleContextMenuAction('refresh')">🔄 Refresh</div>
        <div class="context-menu-separator"></div>
        <div class="context-menu-item" id="menuCreateDb" onclick="handleContextMenuAction('create_db')">📊 Create Database</div>
        <div class="context-menu-item" id="menuCreateTable" onclick="handleContextMenuAction('create_table')">📋 Create Table</div>
        <div class="context-menu-item" id="menuViewData" onclick="handleContextMenuAction('view_data')">👁 View Data</div>
        <div class="context-menu-item" id="menuAddRow" onclick="handleContextMenuAction('add_row')">➕ Add Row</div>
        <div class="context-menu-item" id="menuProperties" onclick="handleContextMenuAction('properties')">ℹ Properties</div>
        <div class="context-menu-separator"></div>
        <div class="context-menu-item" id="menuDelete" onclick="handleContextMenuAction('delete')">🗑 Delete</div>
    </div>

    <!-- Add Server Modal -->
    <div class="modal-overlay" id="addServerModal">
        <div class="modal">
            <div class="modal-header">Add New Server</div>
            <div class="form-group">
                <label>Server Name *</label>
                <input type="text" id="serverName" placeholder="My Server">
            </div>
            <div class="form-group">
                <label>Connection Type</label>
                <select id="connectionType" onchange="toggleConnectionFields()">
                    <option value="local">Local (SQLite File)</option>
                    <option value="postgresql">PostgreSQL</option>
                </select>
            </div>
            <div id="localFields">
                <div class="form-group">
                    <label>Database File Path *</label>
                    <input type="text" id="localDbPath" placeholder="database.sqlite">
                </div>
            </div>
            <div id="postgresFields" class="hidden">
                <div class="form-group">
                    <label>Host</label>
                    <input type="text" id="serverHost" value="localhost">
                </div>
                <div class="form-group">
                    <label>Port</label>
                    <input type="number" id="serverPort" value="5432">
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="serverUsername" value="postgres">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="serverPassword">
                </div>
                <div class="form-group">
                    <label>Database</label>
                    <input type="text" id="serverDatabase" value="postgres">
                </div>
            </div>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeModal('addServerModal')">Cancel</button>
                <button class="btn-save" onclick="saveServer()">Save</button>
            </div>
        </div>
    </div>

    <!-- Create Database Modal -->
    <div class="modal-overlay" id="createDbModal">
        <div class="modal">
            <div class="modal-header">Create Database</div>
            <div class="form-group">
                <label>Database Name *</label>
                <input type="text" id="newDbName" placeholder="my_database">
            </div>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeModal('createDbModal')">Cancel</button>
                <button class="btn-save" onclick="saveDatabase()">Create</button>
            </div>
        </div>
    </div>

    <!-- Create Table Modal -->
    <div class="modal-overlay" id="createTableModal">
        <div class="modal">
            <div class="modal-header">Create Table</div>
            <div class="form-group">
                <label>Table Name *</label>
                <input type="text" id="newTableName" placeholder="users">
            </div>
            <div class="form-group">
                <label>Columns</label>
                <div id="columnBuilder" class="column-builder">
                    <div class="column-row">
                        <input type="text" placeholder="Column Name" class="col-name">
                        <select class="col-type">
                            <option value="INTEGER">INTEGER</option>
                            <option value="VARCHAR">VARCHAR</option>
                            <option value="TEXT">TEXT</option>
                            <option value="FLOAT">FLOAT</option>
                            <option value="BOOLEAN">BOOLEAN</option>
                            <option value="DATETIME">DATETIME</option>
                        </select>
                        <input type="text" placeholder="Size" class="col-size">
                        <label><input type="checkbox" class="col-pk"> PK</label>
                        <label><input type="checkbox" class="col-nullable" checked> NULL</label>
                        <button class="remove-column-btn" onclick="removeColumnRow(this)">×</button>
                    </div>
                </div>
                <button class="add-column-btn" onclick="addColumnRow()">+ Add Column</button>
            </div>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeModal('createTableModal')">Cancel</button>
                <button class="btn-save" onclick="saveTable()">Create</button>
            </div>
        </div>
    </div>

    <!-- Properties Modal -->
    <div class="modal-overlay" id="propertiesModal">
        <div class="modal" style="min-width: 500px;">
            <div class="modal-header" id="propertiesTitle">Properties</div>
            <div id="propertiesContent"></div>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeModal('propertiesModal')">Close</button>
            </div>
        </div>
    </div>

    <!-- Add Row Modal -->
    <div class="modal-overlay" id="addRowModal">
        <div class="modal">
            <div class="modal-header">Add Row to <span id="addRowTableName"></span></div>
            <div id="addRowForm"></div>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeModal('addRowModal')">Cancel</button>
                <button class="btn-save" onclick="saveRow()">Insert</button>
            </div>
        </div>
    </div>

    <script>
        let currentServerId = null;
        let currentDatabase = null;
        let currentTable = null;
        let contextMenuItem = null;
        let selectedNode = null;

        // Load servers on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadServers();
            
            // Ctrl+Enter to execute query
            document.getElementById('queryEditor').addEventListener('keydown', function(e) {
                if (e.ctrlKey && e.key === 'Enter') {
                    executeQuery();
                }
            });
        });

        function loadServers() {
            fetch('/api/servers/')
                .then(r => r.json())
                .then(data => {
                    const tree = document.getElementById('serverTree');
                    tree.innerHTML = '';
                    
                    data.servers.forEach(server => {
                        const serverDiv = document.createElement('div');
                        serverDiv.className = 'tree-item';
                        serverDiv.dataset.serverId = server.id;
                        serverDiv.dataset.type = 'server';
                        serverDiv.innerHTML = `
                            <span class="tree-arrow" onclick="toggleServer(${server.id}, event)">▶</span>
                            <span class="tree-icon">🖥️</span>
                            <span>${server.name}</span>
                        `;
                        serverDiv.oncontextmenu = (e) => showContextMenu(e, 'server', server);
                        serverDiv.onclick = (e) => selectNode(e, 'server', server);
                        
                        const childrenDiv = document.createElement('div');
                        childrenDiv.className = 'tree-children hidden';
                        childrenDiv.id = `server-${server.id}-children`;
                        
                        serverDiv.appendChild(childrenDiv);
                        tree.appendChild(serverDiv);
                    });
                });
        }

        function toggleServer(serverId, event) {
            event.stopPropagation();
            const arrow = event.target;
            const children = document.getElementById(`server-${serverId}-children`);
            
            if (children.classList.contains('hidden')) {
                children.classList.remove('hidden');
                arrow.textContent = '▼';
                loadDatabases(serverId);
            } else {
                children.classList.add('hidden');
                arrow.textContent = '▶';
            }
        }

        function loadDatabases(serverId) {
            fetch('/api/databases/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({server_id: serverId})
            })
            .then(r => r.json())
            .then(data => {
                const children = document.getElementById(`server-${serverId}-children`);
                children.innerHTML = '';
                
                if (data.success) {
                    data.databases.forEach(db => {
                        const dbDiv = document.createElement('div');
                        dbDiv.className = 'tree-item';
                        dbDiv.dataset.serverId = serverId;
                        dbDiv.dataset.database = db;
                        dbDiv.dataset.type = 'database';
                        dbDiv.innerHTML = `
                            <span class="tree-arrow" onclick="toggleDatabase(${serverId}, '${db}', event)">▶</span>
                            <span class="tree-icon">📊</span>
                            <span>${db}</span>
                        `;
                        dbDiv.oncontextmenu = (e) => showContextMenu(e, 'database', {serverId, database: db});
                        dbDiv.onclick = (e) => selectNode(e, 'database', {serverId, database: db});
                        
                        const tablesDiv = document.createElement('div');
                        tablesDiv.className = 'tree-children hidden';
                        tablesDiv.id = `server-${serverId}-db-${db}-tables`;
                        
                        dbDiv.appendChild(tablesDiv);
                        children.appendChild(dbDiv);
                    });
                }
            });
        }

        function toggleDatabase(serverId, database, event) {
            event.stopPropagation();
            const arrow = event.target;
            const tablesDiv = document.getElementById(`server-${serverId}-db-${database}-tables`);
            
            if (tablesDiv.classList.contains('hidden')) {
                tablesDiv.classList.remove('hidden');
                arrow.textContent = '▼';
                loadTables(serverId, database);
            } else {
                tablesDiv.classList.add('hidden');
                arrow.textContent = '▶';
            }
        }

        function loadTables(serverId, database) {
            fetch('/api/tables/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({server_id: serverId, database: database})
            })
            .then(r => r.json())
            .then(data => {
                const tablesDiv = document.getElementById(`server-${serverId}-db-${database}-tables`);
                tablesDiv.innerHTML = '';
                
                if (data.success) {
                    data.tables.forEach(table => {
                        const tableDiv = document.createElement('div');
                        tableDiv.className = 'tree-item';
                        tableDiv.dataset.serverId = serverId;
                        tableDiv.dataset.database = database;
                        tableDiv.dataset.table = table;
                        tableDiv.dataset.type = 'table';
                        tableDiv.innerHTML = `
                            <span class="tree-icon">📋</span>
                            <span>${table}</span>
                        `;
                        tableDiv.oncontextmenu = (e) => showContextMenu(e, 'table', {serverId, database, table});
                        tableDiv.onclick = (e) => selectNode(e, 'table', {serverId, database, table});
                        tablesDiv.appendChild(tableDiv);
                    });
                }
            });
        }

        function selectNode(event, type, data) {
            // Remove previous selection
            document.querySelectorAll('.tree-item.selected').forEach(el => el.classList.remove('selected'));
            
            // Add selection to clicked item
            event.currentTarget.classList.add('selected');
            selectedNode = {type, data};
            
            if (type === 'table') {
                currentServerId = data.serverId;
                currentDatabase = data.database;
                currentTable = data.table;
            } else if (type === 'database') {
                currentServerId = data.serverId;
                currentDatabase = data.database;
            } else if (type === 'server') {
                currentServerId = data.id;
            }
        }

        function showContextMenu(event, type, data) {
            event.preventDefault();
            event.stopPropagation();
            
            contextMenuItem = {type, data};
            const menu = document.getElementById('contextMenu');
            
            // Hide all menu items by default
            document.getElementById('menuCreateDb').style.display = 'none';
            document.getElementById('menuCreateTable').style.display = 'none';
            document.getElementById('menuViewData').style.display = 'none';
            document.getElementById('menuAddRow').style.display = 'none';
            document.getElementById('menuProperties').style.display = 'none';
            document.getElementById('menuDelete').style.display = 'none';
            
            // Show relevant items based on type
            if (type === 'server') {
                document.getElementById('menuCreateDb').style.display = 'block';
                document.getElementById('menuProperties').style.display = 'block';
                document.getElementById('menuDelete').style.display = 'block';
            } else if (type === 'database') {
                document.getElementById('menuCreateTable').style.display = 'block';
                document.getElementById('menuProperties').style.display = 'block';
                document.getElementById('menuDelete').style.display = 'block';
            } else if (type === 'table') {
                document.getElementById('menuViewData').style.display = 'block';
                document.getElementById('menuAddRow').style.display = 'block';
                document.getElementById('menuProperties').style.display = 'block';
                document.getElementById('menuDelete').style.display = 'block';
            }
            
            menu.style.display = 'block';
            menu.style.left = event.pageX + 'px';
            menu.style.top = event.pageY + 'px';
        }

        function handleContextMenuAction(action) {
            document.getElementById('contextMenu').style.display = 'none';
            
            switch(action) {
                case 'refresh':
                    loadServers();
                    break;
                case 'create_db':
                    showCreateDbModal();
                    break;
                case 'create_table':
                    showCreateTableModal();
                    break;
                case 'view_data':
                    viewTableData();
                    break;
                case 'add_row':
                    showAddRowModal();
                    break;
                case 'properties':
                    showProperties();
                    break;
                case 'delete':
                    deleteItem();
                    break;
            }
        }

        function showAddServerModal() {
            document.getElementById('addServerModal').style.display = 'flex';
        }

        function toggleConnectionFields() {
            const type = document.getElementById('connectionType').value;
            if (type === 'local') {
                document.getElementById('localFields').classList.remove('hidden');
                document.getElementById('postgresFields').classList.add('hidden');
            } else {
                document.getElementById('localFields').classList.add('hidden');
                document.getElementById('postgresFields').classList.remove('hidden');
            }
        }

        function saveServer() {
            const name = document.getElementById('serverName').value;
            const type = document.getElementById('connectionType').value;
            
            if (!name) {
                alert('Server name is required');
                return;
            }
            
            let data = {name: name};
            
            if (type === 'local') {
                const dbPath = document.getElementById('localDbPath').value;
                if (!dbPath) {
                    alert('Database file path is required');
                    return;
                }
                data.host = 'local';
                data.database = dbPath;
                data.port = 0;
                data.username = '';
                data.password = '';
            } else {
                data.host = document.getElementById('serverHost').value || 'localhost';
                data.port = parseInt(document.getElementById('serverPort').value) || 5432;
                data.username = document.getElementById('serverUsername').value || 'postgres';
                data.password = document.getElementById('serverPassword').value;
                data.database = document.getElementById('serverDatabase').value || 'postgres';
            }
            
            fetch('/api/servers/add/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            })
            .then(r => r.json())
            .then(result => {
                if (result.success) {
                    closeModal('addServerModal');
                    loadServers();
                } else {
                    alert('Error: ' + result.error);
                }
            });
        }

        function showCreateDbModal() {
            document.getElementById('createDbModal').style.display = 'flex';
        }

        function saveDatabase() {
            const dbName = document.getElementById('newDbName').value;
            if (!dbName) {
                alert('Database name is required');
                return;
            }
            
            fetch('/api/databases/create/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    server_id: contextMenuItem.data.serverId,
                    name: dbName
                })
            })
            .then(r => r.json())
            .then(result => {
                if (result.success) {
                    closeModal('createDbModal');
                    loadDatabases(contextMenuItem.data.serverId);
                } else {
                    alert('Error: ' + result.message);
                }
            });
        }

        function showCreateTableModal() {
            document.getElementById('createTableModal').style.display = 'flex';
        }

        function addColumnRow() {
            const builder = document.getElementById('columnBuilder');
            const row = document.createElement('div');
            row.className = 'column-row';
            row.innerHTML = `
                <input type="text" placeholder="Column Name" class="col-name">
                <select class="col-type">
                    <option value="INTEGER">INTEGER</option>
                    <option value="VARCHAR">VARCHAR</option>
                    <option value="TEXT">TEXT</option>
                    <option value="FLOAT">FLOAT</option>
                    <option value="BOOLEAN">BOOLEAN</option>
                    <option value="DATETIME">DATETIME</option>
                </select>
                <input type="text" placeholder="Size" class="col-size">
                <label><input type="checkbox" class="col-pk"> PK</label>
                <label><input type="checkbox" class="col-nullable" checked> NULL</label>
                <button class="remove-column-btn" onclick="removeColumnRow(this)">×</button>
            `;
            builder.appendChild(row);
        }

        function removeColumnRow(btn) {
            btn.parentElement.remove();
        }

        function saveTable() {
            const tableName = document.getElementById('newTableName').value;
            if (!tableName) {
                alert('Table name is required');
                return;
            }
            
            const columns = [];
            document.querySelectorAll('#columnBuilder .column-row').forEach(row => {
                const name = row.querySelector('.col-name').value;
                if (name) {
                    const type = row.querySelector('.col-type').value;
                    const size = row.querySelector('.col-size').value;
                    const pk = row.querySelector('.col-pk').checked;
                    const nullable = row.querySelector('.col-nullable').checked;
                    
                    columns.push({
                        name: name,
                        type: type,
                        size: size || null,
                        primary_key: pk,
                        nullable: nullable
                    });
                }
            });
            
            if (columns.length === 0) {
                alert('At least one column is required');
                return;
            }
            
            fetch('/api/tables/create/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    server_id: contextMenuItem.data.serverId,
                    table_name: tableName,
                    columns: columns
                })
            })
            .then(r => r.json())
            .then(result => {
                if (result.success) {
                    closeModal('createTableModal');
                    loadTables(contextMenuItem.data.serverId, contextMenuItem.data.database);
                } else {
                    alert('Error: ' + result.message);
                }
            });
        }

        function viewTableData() {
            const {serverId, database, table} = contextMenuItem.data;
            
            fetch('/api/tables/data/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    server_id: serverId,
                    table_name: table,
                    limit: 100
                })
            })
            .then(r => r.json())
            .then(result => {
                if (result.success) {
                    displayResults(result.columns, result.data);
                } else {
                    alert('Error: ' + result.message);
                }
            });
        }

        function showProperties() {
            const {type, data} = contextMenuItem;
            const modal = document.getElementById('propertiesModal');
            const title = document.getElementById('propertiesTitle');
            const content = document.getElementById('propertiesContent');
            
            if (type === 'table') {
                title.textContent = `Table Properties: ${data.table}`;
                
                fetch('/api/tables/info/', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        server_id: data.serverId,
                        table_name: data.table
                    })
                })
                .then(r => r.json())
                .then(result => {
                    if (result.success) {
                        const info = result.info;
                        let html = '<div class="info-section"><h4>Columns</h4><table class="info-table">';
                        html += '<tr><th>Name</th><th>Type</th><th>Nullable</th><th>Primary Key</th></tr>';
                        info.columns.forEach(col => {
                            html += `<tr>
                                <td>${col.name}</td>
                                <td>${col.type}</td>
                                <td>${col.nullable ? 'Yes' : 'No'}</td>
                                <td>${col.is_primary ? '✓' : ''}</td>
                            </tr>`;
                        });
                        html += '</table></div>';
                        content.innerHTML = html;
                    }
                    modal.style.display = 'flex';
                });
            } else if (type === 'database') {
                title.textContent = `Database Properties: ${data.database}`;
                content.innerHTML = `<div class="info-section">
                    <p><strong>Name:</strong> ${data.database}</p>
                    <p><strong>Server ID:</strong> ${data.serverId}</p>
                </div>`;
                modal.style.display = 'flex';
            } else if (type === 'server') {
                title.textContent = `Server Properties: ${data.name}`;
                content.innerHTML = `<div class="info-section">
                    <p><strong>Name:</strong> ${data.name}</p>
                    <p><strong>Host:</strong> ${data.host}</p>
                    <p><strong>Port:</strong> ${data.port}</p>
                    <p><strong>Database:</strong> ${data.database}</p>
                </div>`;
                modal.style.display = 'flex';
            }
        }

        function showAddRowModal() {
            const {serverId, database, table} = contextMenuItem.data;
            document.getElementById('addRowTableName').textContent = table;
            
            fetch('/api/tables/info/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    server_id: serverId,
                    table_name: table
                })
            })
            .then(r => r.json())
            .then(result => {
                if (result.success) {
                    const form = document.getElementById('addRowForm');
                    form.innerHTML = '';
                    
                    result.info.columns.forEach(col => {
                        if (!col.is_primary) {
                            const div = document.createElement('div');
                            div.className = 'form-group';
                            
                            let inputHtml = '';
                            if (col.type.includes('BOOLEAN')) {
                                inputHtml = `<select id="row_${col.name}">
                                    <option value="">-- Select --</option>
                                    <option value="true">TRUE</option>
                                    <option value="false">FALSE</option>
                                </select>`;
                            } else if (col.type.includes('INTEGER') || col.type.includes('FLOAT')) {
                                inputHtml = `<input type="number" id="row_${col.name}" step="${col.type.includes('FLOAT') ? 'any' : '1'}">`;
                            } else {
                                inputHtml = `<input type="text" id="row_${col.name}">`;
                            }
                            
                            div.innerHTML = `
                                <label>${col.name} (${col.type})${!col.nullable ? ' *' : ''}</label>
                                ${inputHtml}
                            `;
                            form.appendChild(div);
                        }
                    });
                    
                    document.getElementById('addRowModal').style.display = 'flex';
                }
            });
        }

        function saveRow() {
            const {serverId, database, table} = contextMenuItem.data;
            const rowData = {};
            
            document.querySelectorAll('#addRowForm input, #addRowForm select').forEach(input => {
                const colName = input.id.replace('row_', '');
                if (input.value !== '') {
                    let value = input.value;
                    if (value === 'true') value = true;
                    else if (value === 'false') value = false;
                    else if (!isNaN(value) && !isNaN(parseFloat(value))) {
                        value = parseFloat(value);
                        if (Number.isInteger(value)) value = parseInt(value);
                    }
                    rowData[colName] = value;
                }
            });
            
            fetch('/api/rows/insert/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    server_id: serverId,
                    table_name: table,
                    data: rowData
                })
            })
            .then(r => r.json())
            .then(result => {
                if (result.success) {
                    closeModal('addRowModal');
                    viewTableData();
                } else {
                    alert('Error: ' + result.message);
                }
            });
        }

        function deleteItem() {
            const {type, data} = contextMenuItem;
            
            let confirmMsg = 'Are you sure?';
            if (type === 'server') confirmMsg = `Delete server "${data.name}" and all its databases?`;
            else if (type === 'database') confirmMsg = `Delete database "${data.database}" and all its tables?`;
            else if (type === 'table') confirmMsg = `Delete table "${data.table}"?`;
            
            if (!confirm(confirmMsg)) return;
            
            if (type === 'server') {
                fetch('/api/servers/delete/', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({server_id: data.id})
                })
                .then(r => r.json())
                .then(result => {
                    if (result.success) {
                        loadServers();
                    } else {
                        alert('Error: ' + result.error);
                    }
                });
            } else if (type === 'database') {
                fetch('/api/databases/drop/', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        server_id: data.serverId,
                        name: data.database
                    })
                })
                .then(r => r.json())
                .then(result => {
                    if (result.success) {
                        loadDatabases(data.serverId);
                    } else {
                        alert('Error: ' + result.message);
                    }
                });
            } else if (type === 'table') {
                fetch('/api/tables/drop/', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        server_id: data.serverId,
                        table_name: data.table
                    })
                })
                .then(r => r.json())
                .then(result => {
                    if (result.success) {
                        loadTables(data.serverId, data.database);
                    } else {
                        alert('Error: ' + result.message);
                    }
                });
            }
        }

        function executeQuery() {
            if (!currentServerId) {
                alert('Please select a server first');
                return;
            }
            
            const query = document.getElementById('queryEditor').value;
            if (!query.trim()) {
                alert('Please enter a query');
                return;
            }
            
            fetch('/api/query/execute/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    server_id: currentServerId,
                    query: query
                })
            })
            .then(r => r.json())
            .then(result => {
                if (result.success) {
                    displayResults(result.columns, result.data);
                } else {
                    alert('Error: ' + result.message);
                }
            });
        }

        function displayResults(columns, data) {
            const panel = document.getElementById('resultsPanel');
            
            if (!columns || columns.length === 0) {
                panel.innerHTML = '<div style="padding: 20px;">Query executed successfully.</div>';
                return;
            }
            
            let html = '<table class="results-table"><thead><tr>';
            columns.forEach(col => {
                html += `<th>${col}</th>`;
            });
            html += '</tr></thead><tbody>';
            
            data.forEach(row => {
                html += '<tr>';
                row.forEach(cell => {
                    html += `<td>${cell === null ? '<em>NULL</em>' : cell}</td>`;
                });
                html += '</tr>';
            });
            
            html += '</tbody></table>';
            panel.innerHTML = html;
        }

        function clearResults() {
            document.getElementById('resultsPanel').innerHTML = '<div style="padding: 20px; color: #888;">Results cleared.</div>';
            document.getElementById('queryEditor').value = '';
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        // Close context menu when clicking elsewhere
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.context-menu')) {
                document.getElementById('contextMenu').style.display = 'none';
            }
        });
    </script>
</body>
</html>
